<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poker Ranking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="shell home-shell minimal-shell">
      <section class="home-minimal">
        <h1>Poker Ranking</h1>

        <div class="home-actions-minimal">
          <a class="button-primary" href="input.html">Start Game</a>
          <a class="button-secondary" href="leaderboard.html">View Rankings</a>
        </div>

        <div class="room-entry-grid">
          <form id="create-room-form" class="minimal-form">
            <textarea
              id="players-list"
              rows="3"
              placeholder="Player 1, Player 2, Player 3"
            ></textarea>
            <button class="button-primary" type="submit">Create Room</button>
            <p id="create-room-status" class="status-text" aria-live="polite"></p>
            <p class="room-preview">Room Code <strong id="created-room-code">-</strong></p>
          </form>

          <form id="join-room-form" class="minimal-form">
            <input id="room-code-input" type="text" maxlength="8" placeholder="ROOM CODE" />
            <button class="button-secondary" type="submit">Join Room</button>
            <p id="join-room-status" class="status-text" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
